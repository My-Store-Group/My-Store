name: Update App List
on:
  schedule:
    - cron: '0 * * * *' # Har 1 ghante me chalega
  workflow_dispatch: # Manual button

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      
      - name: Install dependencies
        run: |
          pip install requests pyaxmlparser

      - name: Run Update Script
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<EOF
          import requests
          import json
          import os
          import re
          from pyaxmlparser import APK

          token = os.getenv('GH_TOKEN')
          headers = {'Authorization': f'token {token}', 'Accept': 'application/vnd.github.v3+json'}
          
          def get_package_details(url):
              try:
                  print(f"Downloading {url} to extract info...")
                  r = requests.get(url, stream=True)
                  with open("temp.apk", "wb") as f:
                      for chunk in r.iter_content(chunk_size=8192):
                          f.write(chunk)
                  apk = APK("temp.apk")
                  pname = apk.package
                  return pname
              except Exception as e:
                  print(f"Error extracting APK info: {e}")
              return None

          def get_apps():
              apps = []
              query = "topic:my-store-distribution"
              url = f"https://api.github.com/search/repositories?q={query}"
              response = requests.get(url, headers=headers).json()
              
              repos = response.get('items', [])
              for repo in repos:
                  owner = repo['owner']['login']
                  name = repo['name']
                  branch = repo.get('default_branch', 'main')
                  print(f"Processing {owner}/{name}...")
                  
                  contents_url = f"https://api.github.com/repos/{owner}/{name}/contents/"
                  contents = requests.get(contents_url, headers=headers).json()
                  
                  screenshots = []
                  banner_url = None
                  
                  if isinstance(contents, list):
                      ss_files = [f['name'] for f in contents if f['name'].lower().startswith('screenshot') and f['name'].lower().endswith(('.png', '.jpg', '.jpeg'))]
                      ss_files.sort(key=lambda x: int(re.search(r'\d+', x).group()) if re.search(r'\d+', x) else 0)
                      screenshots = [f"https://raw.githubusercontent.com/{owner}/{name}/{branch}/{f}" for f in ss_files]
                      
                      banner_file = next((f['name'] for f in contents if f['name'].lower().startswith('banner') and f['name'].lower().endswith(('.png', '.jpg', '.jpeg'))), None)
                      if banner_file:
                          banner_url = f"https://raw.githubusercontent.com/{owner}/{name}/{branch}/{banner_file}"

                  rel_url = f"https://api.github.com/repos/{owner}/{name}/releases"
                  releases = requests.get(rel_url, headers=headers).json()
                  
                  apk_url = ""
                  apk_size = 0
                  version = "v1.0"
                  release_notes = "Verified distribution."
                  
                  if isinstance(releases, list) and len(releases) > 0:
                      for rel in releases:
                          assets = rel.get('assets', [])
                          apk_asset = next((a for a in assets if a['name'].lower().endswith('.apk')), None)
                          if apk_asset:
                              apk_url = apk_asset['browser_download_url']
                              apk_size = apk_asset['size']
                              version = rel['tag_name']
                              release_notes = rel.get('body', "Updates included.")
                              break
                  
                  if apk_url:
                      p_name = get_package_details(apk_url)
                      apps.append({
                          "name": name,
                          "packageName": p_name,
                          "owner": owner,
                          "ownerAvatar": repo['owner']['avatar_url'],
                          "description": repo.get('description') or "Verified Distribution",
                          "version": version,
                          "downloadUrl": apk_url,
                          "iconUrl": f"https://raw.githubusercontent.com/{owner}/{name}/{branch}/icon.png",
                          "screenshots": screenshots,
                          "bannerUrl": banner_url,
                          "releaseNotes": release_notes,
                          "fileSize": f"{apk_size // (1024 * 1024)} MB",
                          "category": "Games" if ("game" in (repo.get('topics') or []) or "game" in name.lower()) else "Apps",
                          "repoUrl": repo['html_url'],
                          "stargazers_count": repo['stargazers_count'],
                          "forks_count": repo['forks_count'],
                          "updatedAt": repo['updated_at'],
                          "isProtected": True
                      })
              return apps

          all_apps = get_apps()
          with open('apps.json', 'w') as f:
              json.dump(all_apps, f, indent=4)
          EOF

      - name: Commit and Push
        id: commit_step
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add apps.json
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Update apps.json with dynamic screenshots and banners"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Send Firebase Notification
        if: steps.commit_step.outputs.changed == 'true'
        env:
          FCM_KEY: ${{ secrets.FIREBASE_SERVER_KEY }}
        run: |
          curl -X POST -H "Authorization: key=$FCM_KEY" \
               -H "Content-Type: application/json" \
               -d '{
                 "to": "/topics/all_users",
                 "notification": {
                   "title": "🚀 My Store Update!",
                   "body": "Naye apps aur updates available hain! Check out what is new in My Store.",
                   "icon": "ic_notification"
                 },
                 "priority": "high"
               }' https://fcm.googleapis.com/fcm/send
